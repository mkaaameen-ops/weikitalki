<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ويكي توكي العائلي 📻</title>
    
    <style>
        /* ألوان صريحة وعالية التباين ومبهجة */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* خلفية فاتحة ومريحة جداً */
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 93vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        .badge {
            background-color: #ff4757;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        h1 {
            margin: 5px 0;
            font-size: 32px;
            color: #2c3e50;
            font-weight: 900;
        }

        /* الشاشة الدائرية المركزية الواضحة */
        .screen-container {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background-color: #ffffff; /* شاشة بيضاء ناصعة */
            border: 8px solid #00d2d3; /* إطار فيروزي فاقع */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 20px 0;
        }

        .status-box {
            background-color: #2ed573; /* أخضر واضح للاتصال */
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .speaker-name {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin: 5px 0;
        }

        .channel-tag {
            position: absolute;
            bottom: 15px;
            background-color: #ff9f43; /* برتقالي فاقع */
            color: white;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        /* صندوق الاسم اللاسلكي */
        .user-box {
            width: 100%;
            max-width: 320px;
            background-color: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
            text-align: right;
            box-sizing: border-box;
        }

        .user-box label {
            display: block;
            font-size: 12px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .user-box input {
            width: 100%;
            border: 2px solid #00d2d3;
            padding: 8px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            box-sizing: border-box;
            outline: none;
        }

        /* زر التحدث الضخم والملون */
        .ptt-button-container {
            text-align: center;
            margin-top: 20px;
        }

        .ptt-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2d3, #00a8ff); /* أزرق فيروزي فاقع */
            border: 6px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0, 168, 255, 0.4);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.3s;
            outline: none;
        }

        .ptt-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #ff4757, #ff6b81); /* يتحول للأحمر الفاقع فوراً عند الضغط */
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .ptt-btn svg {
            width: 45px;
            height: 45px;
            fill: currentColor;
            margin-bottom: 5px;
        }

        .instruction {
            font-size: 13px;
            color: #7f8c8d;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="badge">راديو العائلة الممتع 📻</div>
        <h1>وِيكِي تُوكِي</h1>
    </header>

    <div class="screen-container" id="screen-hub">
        <div class="status-box" id="status-text">جاهز للاستقبال</div>
        <div class="speaker-name" id="live-speaker">حول...</div>
        <div class="channel-tag">قناة رقم 01</div>
    </div>

    <div class="user-box">
        <label>اكتب اسمك هنا:</label>
        <input id="username" type="text" value="كابتن عائلي">
    </div>

    <div class="ptt-button-container">
        <button id="ptt-btn" class="ptt-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
            <span>اضغط</span>
        </button>
        <div class="instruction">علق إصبعك على الزر وتكلم!</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
