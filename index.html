<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ويكي توكي - الموديل الحي 📻</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        /* تأثير التوهج للنيون */
        .neon-glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }
        .neon-glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .neon-glow-rose { box-shadow: 0 0 30px rgba(244, 63, 94, 0.6); }

        /* أنيميشن حركة موجات الصوت النيون */
        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .wave-bar {
            animation: wave-bounce 0.6s infinite ease-in-out;
            transform-origin: center;
        }
        /* إيقاف حركة الموجات افتراضياً */
        .waves-paused .wave-bar { animation-play-state: paused; transform: scaleY(0.2) !important; }

        /* منع التحديد العشوائي أثناء الضغط المطول على الجوال */
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-between p-4 no-select">

    <header class="text-center mt-2 w-full max-w-md">
        <div class="inline-block bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-full text-xs font-bold text-cyan-400 tracking-widest uppercase mb-2">
            🔴 الموديل الحي العائلي
        </div>
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-teal-400 to-emerald-400">وِيكِي تُوكِي</h1>
    </header>

    <main class="w-full max-w-sm flex flex-col items-center gap-6">
        
        <div id="screen-hub" class="w-64 h-64 rounded-full bg-slate-950 border-4 border-cyan-500/30 neon-glow-cyan flex flex-col items-center justify-center p-6 relative transition-all duration-500 overflow-hidden">
            
            <div class="absolute inset-0 bg-cyan-500/5 opacity-50"></div>

            <div class="flex items-center gap-2 z-10 mb-2">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                <span id="status-text" class="text-xs font-bold text-emerald-400 tracking-wide">جاهز للاستقبال</span>
            </div>

            <div id="live-speaker" class="text-xl font-black text-center text-slate-200 z-10 my-1 h-7">حول...</div>

            <div id="waveform" class="flex items-center justify-center gap-1 h-12 w-32 z-10 waves-paused mt-2">
                <div class="w-1 h-full bg-cyan-400 rounded-full wave-bar" style="animation-delay: 0.1s"></div>
                <div class="w-1 h-full bg-teal-400 rounded-full wave-bar" style="animation-delay: 0.3s"></div>
                <div class="w-1 h-full bg-emerald-400 rounded-full wave-bar" style="animation-delay: 0.5s"></div>
                <div class="w-1 h-full bg-teal-400 rounded-full wave-bar" style="animation-delay: 0.2s"></div>
                <div class="w-1 h-full bg-cyan-400 rounded-full wave-bar" style="animation-delay: 0.4s"></div>
            </div>

            <div class="absolute bottom-4 bg-slate-900 border border-slate-800 px-3 py-0.5 rounded-md text-[10px] font-bold text-amber-400 z-10">
                CHANNEL 01
            </div>
        </div>

        <div class="w-full bg-slate-900/80 backdrop-blur border border-slate-800 rounded-2xl p-4 flex items-center gap-3">
            <div class="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-xl">👤</div>
            <div class="flex-1">
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">معرّفك اللاسلكي</label>
                <input id="username" type="text" value="عضو العائلة" class="w-full bg-transparent font-bold text-cyan-400 text-sm focus:outline-none border-b border-transparent focus:border-cyan-500 transition-all">
            </div>
        </div>

    </main>

    <div class="flex flex-col items-center justify-center my-4 w-full">
        <button id="ptt-btn" class="w-40 h-40 rounded-full bg-slate-900 border-4 border-slate-800 shadow-2xl flex items-center justify-center transition-all duration-150 active:scale-95 cursor-pointer focus:outline-none relative group">
            
            <div id="btn-glow" class="absolute inset-0 rounded-full bg-gradient-to-tr from-cyan-500 to-emerald-500 opacity-20 group-hover:opacity-30 transition-opacity"></div>
            
            <div id="inner-btn" class="w-32 h-32 rounded-full bg-gradient-to-tr from-cyan-500 to-teal-600 flex flex-col items-center justify-center shadow-lg transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-950 transition-transform duration-200 group-active:scale-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span class="text-[10px] text-slate-950 font-black mt-1 tracking-wider">TALK</span>
            </div>
        </button>
        <p class="text-[11px] text-slate-500 mt-3 font-bold tracking-widest uppercase">اضغط مطولاً للتحدث فوراُ</p>
    </div>

    <footer class="text-[10px] text-slate-600">
        النموذج الحي • متصل وجاهز
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
