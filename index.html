<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ويكي توكي العائلي 📻</title>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; 
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 93vh;
            user-select: none;
            -webkit-user-select: none;
        }

        header { text-align: center; margin-bottom: 10px; }
        .badge { background-color: #ff4757; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        h1 { margin: 5px 0; font-size: 32px; color: #2c3e50; font-weight: 900; }

        .screen-container {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background-color: #ffffff; 
            border: 8px solid #00d2d3; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 20px 0;
        }

        .status-box { background-color: #2ed573; color: white; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 10px; transition: background 0.3s; }
        .speaker-name { font-size: 24px; font-weight: bold; color: #2c3e50; text-align: center; margin: 5px 0; }
        .channel-tag { position: absolute; bottom: 15px; background-color: #ff9f43; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        .user-box {
            width: 100%; max-width: 320px; background-color: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; text-align: right; box-sizing: border-box;
        }
        .user-box label { display: block; font-size: 12px; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
        .user-box input { width: 100%; border: 2px solid #00d2d3; padding: 8px; border-radius: 8px; font-size: 16px; font-weight: bold; color: #2c3e50; box-sizing: border-box; outline: none; }

        /* منطقة الزر والموجات الديناميكية المتفجرة */
        .ptt-button-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        /* حلقات الموجات الصوتية المخفية التي تنبض أثناء التحدث */
        .sonic-wave {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #ff4757;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            transition: all 0.1s ease;
        }
        /* أنيميشن النبض الديناميكي للموجات عند التفعيل */
        .wave-active-1 { animation: pulseWave 1s infinite linear; }
        .wave-active-2 { animation: pulseWave 1s infinite linear 0.4s; }

        @keyframes pulseWave {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .ptt-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2d3, #00a8ff); 
            border: 6px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0, 168, 255, 0.3);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.1s, background 0.3s;
            outline: none;
            position: relative;
            z-index: 2; /* فوق الموجات */
        }

        .ptt-btn.talking {
            background: linear-gradient(135deg, #ff4757, #ff6b81) !important;
            box-shadow: 0 8px 25px rgba(255, 71, 87, 0.5) !important;
            transform: scale(0.96);
        }

        .ptt-btn svg { width: 45px; height: 45px; fill: currentColor; margin-bottom: 5px; }
        .instruction { font-size: 13px; color: #7f8c8d; font-weight: bold; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="badge">راديو العائلة الممتع 📻</div>
        <h1>وِيكِي تُوكِي</h1>
    </header>

    <div class="screen-container" id="screen-hub">
        <div class="status-box" id="status-text">جاهز للاستقبال</div>
        <div class="speaker-name" id="live-speaker">حول...</div>
        <div class="channel-tag">قناة رقم 01</div>
    </div>

    <div class="user-box">
        <label>اكتب اسمك هنا:</label>
        <input id="username" type="text" value="عضو عائلي">
    </div>

    <div>
        <div class="ptt-button-container">
            <div id="wave1" class="sonic-wave"></div>
            <div id="wave2" class="sonic-wave"></div>
            
            <button id="ptt-btn" class="ptt-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
                <span id="btn-label">اضغط</span>
            </button>
        </div>
        <div class="instruction">علق إصبعك على الزر وتكلم!</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
